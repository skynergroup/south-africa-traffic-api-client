version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "skynergroup/senior"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      dependencies:
        patterns: ["*"]
